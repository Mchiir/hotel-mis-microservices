services:
  mongo:
    image: mongo:7
    container_name: hotel-mis-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - hotel-mis-net

  auth-service:
    build: ./services/auth-service
    container_name: hotel-mis-auth
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/hotel_auth
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
      COOKIE_SECURE: 'false'
    ports:
      - '3001:3001'
    depends_on:
      - mongo
    networks:
      - hotel-mis-net

  user-service:
    build: ./services/user-service
    container_name: hotel-mis-user
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/hotel_auth
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
    ports:
      - '3002:3002'
    depends_on:
      - mongo
    networks:
      - hotel-mis-net

  room-service:
    build: ./services/room-service
    container_name: hotel-mis-room
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://mongo:27017/hotel_rooms
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
    ports:
      - '3003:3003'
    depends_on:
      - mongo
    networks:
      - hotel-mis-net

  reservation-service:
    build: ./services/reservation-service
    container_name: hotel-mis-reservation
    environment:
      PORT: 3004
      MONGODB_URI: mongodb://mongo:27017/hotel_reservations
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
      ROOM_SERVICE_URL: http://room-service:3003
    ports:
      - '3004:3004'
    depends_on:
      - mongo
      - room-service
    networks:
      - hotel-mis-net

  payment-service:
    build: ./services/payment-service
    container_name: hotel-mis-payment
    environment:
      PORT: 3005
      MONGODB_URI: mongodb://mongo:27017/hotel_payments
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
      RESERVATION_SERVICE_URL: http://reservation-service:3004
    ports:
      - '3005:3005'
    depends_on:
      - mongo
      - reservation-service
    networks:
      - hotel-mis-net

  report-service:
    build: ./services/report-service
    container_name: hotel-mis-report
    environment:
      PORT: 3006
      NODE_ENV: production
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      CLIENT_URL: http://localhost:5173
      ROOM_SERVICE_URL: http://room-service:3003
      RESERVATION_SERVICE_URL: http://reservation-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
    ports:
      - '3006:3006'
    depends_on:
      - room-service
      - reservation-service
      - payment-service
    networks:
      - hotel-mis-net

  gateway:
    image: nginx:alpine
    container_name: hotel-mis-gateway
    ports:
      - '8080:80'
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - room-service
      - reservation-service
      - payment-service
      - report-service
    networks:
      - hotel-mis-net

volumes:
  mongo_data:

networks:
  hotel-mis-net:
    driver: bridge
